<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参加画面 - eng-club-quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="join">

  <header class="topbar">
    <img src="images/BEB.png" alt="BEB" class="logo">
    <span class="brand">ENG-CLUB-QUIZ <span class="hi">/ PLAYER</span></span>
  </header>

  <!-- [1] 起動：PIN + ニックネーム -->
  <section id="phase-entry" class="phase">
    <h1>参加する</h1>
    <div class="form-row">
      <label for="input-pin">PIN（6桁）</label>
      <input id="input-pin" type="tel" inputmode="numeric" maxlength="6" placeholder="123456" autocomplete="off">
    </div>
    <div class="form-row">
      <label for="input-nick">ニックネーム</label>
      <input id="input-nick" type="text" maxlength="20" placeholder="例: Taro" autocomplete="off">
    </div>
    <div class="form-row">
      <button id="btn-join" class="primary big">入室する</button>
    </div>
    <p id="entry-error" class="error"></p>
  </section>

  <!-- [2] 入室待機 -->
  <section id="phase-waiting" class="phase hidden">
    <h1 id="hello-nick">入室済み</h1>
    <p class="big-message">講師の合図を待ってください…</p>
    <div class="my-status">
      <div>あなたのスコア：<span id="my-score-wait">0</span></div>
    </div>
  </section>

  <!-- [3] 回答 -->
  <section id="phase-answer" class="phase hidden">
    <div class="qheader">
      <div class="qindex">Q<span id="j-q-index">1</span></div>
      <div class="qtimer">残り <span id="j-q-timer">--</span> 秒</div>
    </div>
    <p class="answer-instruction">講師画面と同じ記号をタップ</p>
    <div class="join-choices">
      <button class="choice-btn c0" data-choice="0" aria-label="選択肢1">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="12,2 22,12 12,22 2,12" fill="currentColor"/></svg>
      </button>
      <button class="choice-btn c1" data-choice="1" aria-label="選択肢2">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="currentColor"/></svg>
      </button>
      <button class="choice-btn c2" data-choice="2" aria-label="選択肢3">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="12,2.5 22,21.5 2,21.5" fill="currentColor"/></svg>
      </button>
      <button class="choice-btn c3" data-choice="3" aria-label="選択肢4">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><rect x="2.5" y="2.5" width="19" height="19" fill="currentColor"/></svg>
      </button>
    </div>
    <p id="answer-state" class="answer-state"></p>
  </section>

  <!-- [4] 結果 -->
  <section id="phase-result" class="phase hidden">
    <h1 id="result-headline">結果</h1>
    <div class="result-box">
      <div>あなたの選択：<span id="my-choice">-</span></div>
      <div>正解：<span id="correct-choice">-</span></div>
      <div class="big-message">獲得：<span id="gained-points">0</span> 点</div>
      <div>累計スコア：<span id="my-score">0</span> 点 / 現在順位：<span id="my-rank">-</span> 位</div>
    </div>
    <p class="big-message">次の問題を待ってください…</p>
  </section>

  <!-- [5] 最終 -->
  <section id="phase-finished" class="phase hidden">
    <h1>お疲れさまでした</h1>
    <div class="result-box">
      <div class="big-message">最終スコア：<span id="final-score">0</span> 点</div>
      <div class="big-message">最終順位：<span id="final-rank">-</span> 位</div>
    </div>
  </section>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/join.js"></script>
</body>
</html>
